<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO APP</title>
    <link rel="stylesheet" href="main.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <h1 id="heading">Welcome to TaskFlow</h1>
    <div id="popup">
      <p class="popup-warning">Please list any item here!</p>
      <button id="closePopup">Close</button>
    </div>
    <div class="bg-container">
      <div class="container">
        <input type="text" id="task" placeholder="Enter a task" />
        <button id="addTask">Add Task</button>
        <div id="tasklist-container">
          <p id='incompleted-items-heading'>Incompleted Items / TO-DO's</p>
       
          <ul id="tasklist">

        </ul>
        </div>
        
        <div id="completed-items-container">
          <p id='completed-items-heading'>Completed Items / TO-DO's</p>
        <div id="completed-items-list">
          
          <ul id="completedlist">

          </ul>
        </div>
        </div>
      </div>
    </div>
    <footer>
    <p>TaskFlow copyright © 2026</p>
    <p>All rights reserved.</p>
    </footer>
  </body>
</html>
